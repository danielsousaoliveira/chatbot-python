server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    location /crexusers/ {
        proxy_pass http://app:5000;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
