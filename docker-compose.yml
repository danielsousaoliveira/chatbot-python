services:
  app:
    build: .
    ports:
      - "5001:5000"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/crexusers.db
    volumes:
      - sqlite_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  client:
    build: ./client
    ports:
      - "3000:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlite_data:
